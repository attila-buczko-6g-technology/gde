<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blogplatform</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#" data-view="list">📝 Blogplatform</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNav" aria-controls="mainNav"
                aria-expanded="false" aria-label="Navigáció">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="#" data-view="list">Bejegyzések</a></li>
                <li class="nav-item auth-only d-none"><a class="nav-link" href="#" data-view="new-post">Új bejegyzés</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item anon-only">
                    <a class="nav-link" href="#" data-view="login">Belépés</a>
                </li>
                <li class="nav-item anon-only">
                    <a class="nav-link" href="#" data-view="register">Regisztráció</a>
                </li>
                <li class="nav-item auth-only d-none">
                    <span class="nav-link"
                          >Üdv, <strong id="userBadge"></strong>!</span>
                </li>
                <li class="nav-item auth-only d-none">
                    <a class="nav-link" href="#" id="logoutBtn">Kilépés</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">

    <div id="alertContainer"></div>

    <!-- Bejegyzések listája -->
    <section data-view-content="list">
        <h1 class="mb-3">Bejegyzések</h1>
        <div id="postList" class="row g-3"></div>
        <nav class="mt-4">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </section>

    <!-- Bejegyzés részletek -->
    <section data-view-content="detail" class="d-none">
        <button class="btn btn-link mb-2" data-view="list">&larr; Vissza a listához</button>
        <article id="postDetail"></article>
        <hr>
        <h3>Kommentek</h3>
        <div id="commentList" class="mb-3"></div>
        <form id="commentForm" class="auth-only d-none">
            <div class="mb-2">
                <textarea class="form-control" id="commentContent" rows="3"
                          placeholder="Írj egy kommentet..." required></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Komment küldése</button>
        </form>
        <div class="anon-only alert alert-info">
            A kommenteléshez <a href="#" data-view="login">jelentkezz be</a>.
        </div>
    </section>

    <!-- Belépés -->
    <section data-view-content="login" class="d-none">
        <h1>Belépés</h1>
        <form id="loginForm" class="col-md-6">
            <div class="mb-3">
                <label class="form-label">Felhasználónév</label>
                <input class="form-control" id="loginUsername" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Jelszó</label>
                <input type="password" class="form-control" id="loginPassword" required>
            </div>
            <button class="btn btn-primary" type="submit">Belépés</button>
        </form>
    </section>

    <!-- Regisztráció -->
    <section data-view-content="register" class="d-none">
        <h1>Regisztráció</h1>
        <form id="registerForm" class="col-md-6">
            <div class="mb-3">
                <label class="form-label">Felhasználónév</label>
                <input class="form-control" id="regUsername" minlength="3" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="regEmail" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Jelszó (min. 6 karakter)</label>
                <input type="password" class="form-control" id="regPassword" minlength="6" required>
            </div>
            <button class="btn btn-success" type="submit">Regisztráció</button>
        </form>
    </section>

    <!-- Új / szerkesztés bejegyzés -->
    <section data-view-content="new-post" class="d-none">
        <h1 id="postFormTitle">Új bejegyzés</h1>
        <form id="postForm" class="col-md-10">
            <input type="hidden" id="postId">
            <div class="mb-3">
                <label class="form-label">Cím</label>
                <input class="form-control" id="postTitle" maxlength="200" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tartalom</label>
                <textarea class="form-control" id="postContent" rows="10" required></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Mentés</button>
            <button type="button" class="btn btn-secondary" data-view="list">Mégse</button>
        </form>
    </section>

</main>

<footer class="bg-light text-center py-3 mt-5 border-top">
    <small class="text-muted">Blogplatform &middot; Spring Boot + Bootstrap + jQuery</small>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
